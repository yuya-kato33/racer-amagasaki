<!-- 表示画面 -->
<div class="container">
  <h1>出場選手一覧</h1>

  <app-selector-panel (selectionChanged)="onSelectionChanged($event)"></app-selector-panel>

  <!-- 表示切替ボタン -->
  <div style="margin: 10px 0;">
    <button (click)="useSeries = false" [disabled]="!useSeries">当日モード</button>
    <button (click)="useSeries = true" [disabled]="useSeries">シリーズモード</button>
  </div>

  <!-- 表示内容切替 -->
  <div *ngIf="useSeries">
    <app-racer-series-list [startDate]="selectedDate" [jcd]="selectedJcd"></app-racer-series-list>
  </div>

  <div *ngIf="!useSeries">
    <app-racer-list [hdate]="selectedDate" [jcd]="selectedJcd"></app-racer-list>
  </div>
</div>
