<!-- 表示画面 -->

<!-- ローディング中 -->
<div *ngIf="isLoading">読み込み中...</div>

<!-- エラー表示 -->
<div *ngIf="error" class="error">{{ error }}</div>

<!-- 選手カードのグリッド表示 -->
<div class="racer-grid">
  <div class="racer-card" *ngFor="let racer of racers">
    <img 
      [src]="getPhotoPath(racer.toban)"
      [alt]="racer.name" 
      width="100" height="120" 
      (error)="setFallbackImage($event)" />

    <div class="racer-info">
      <strong>{{ racer.name }}</strong> 
      <div>({{ racer.kyu }}・{{ normalizeShibu(racer.shibu) }} 支部)</div>
      <div>登録番号: {{ racer.toban }}</div>
      <div>勝率: {{ racer.zsyo }}</div>
      <div>2連: {{ racer.z2ren }}% / 3連: {{ racer.z3ren }}%</div>
    </div>
  </div>
</div>
