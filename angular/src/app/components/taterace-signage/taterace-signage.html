<div class="taterace-screen" [style.background]="getBgColor(racer.teiban)" [style.color]="getTextColor(racer.teiban)">

    <!-- 上部 -->
    <div class="header">
        <div class="header-left">
            第{{ formatRaceNo(racer.rno) }}レース
        </div>
        <div class="header-right">
            {{ getRaceTitle() }}
        </div>
    </div>

    <!-- 中央 -->
    <div class="main">

        <!-- 左: 縦文字 -->
        <div class="left">
            <div class="vertical">
                {{ getPlaceName() }}
            </div>
        </div>

        <!-- 右: 写真 -->
        <div class="right">
            <img [src]="getPhoto()" />
        </div>

    </div>

    <!-- 下部 -->
    <div class="footer">
        <div class="toban">{{ racer.toban }}</div>
        <div class="name">{{ racer.name }}</div>
        <div class="shibu">({{ racer.shibu }})</div>
    </div>

</div>
